<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Signing you in...</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
  </head>
  <body>
    <p>Signing you in...</p>
    <script>
      // Supabase often returns tokens in the URL fragment (after #).
      // Read the hash, convert it into a query string and redirect to a path
      // that your mobile app Universal Links will handle:
      (function () {
        try {
          const hash = window.location.hash || "";
          // If there's no hash, just go to the sign-in page.
          if (!hash) {
            window.location.replace("/sign-in");
            return;
          }

          // Convert "#access_token=...&refresh_token=..." to "?access_token=...&refresh_token=..."
          const query = hash.replace(/^#/, "?");
          // Redirect to a query-parameter-friendly URL that the app will handle.
          // Because you have Universal Links for kiado.co.uk, this will open the app
          // (if installed) with proper query params.
          const target = "/sign-in" + query;
          // Use absolute URL to be safe:
          const absolute = window.location.origin + target;
          window.location.replace(absolute);
        } catch (e) {
          // Fallback: go to sign-in page
          window.location.replace("/sign-in");
        }
      })();
    </script>
  </body>
</html>
